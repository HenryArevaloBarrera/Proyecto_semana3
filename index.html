<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - Red Social Académica</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EduConnect</span>
            </div>
            
            <div class="nav-controls">
                <!-- Botón crear post flotante (visible solo en móvil) -->
                <button class="fab-mobile" onclick="openCreatePostModal()" id="fab-mobile">
                    <i class="fas fa-plus"></i>
                </button>
                
                <!-- Selector de idioma -->
                <div class="language-selector">
                    <button class="lang-btn" onclick="toggleLanguageMenu()">
                        <i class="fas fa-globe"></i>
                        <span id="current-lang">Español</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <button onclick="changeLanguage('es')" class="lang-option active" data-lang="es">
                            <span>🇪🇸 Español</span>
                        </button>
                        <button onclick="changeLanguage('en')" class="lang-option" data-lang="en">
                            <span>🇬🇧 English</span>
                        </button>
                    </div>
                </div>
                
                <!-- Selector de tema -->
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <main class="main-container">
        <!-- Sección de autenticación -->
        <div id="auth-section" class="auth-section">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-graduation-cap"></i>
                    <h2 data-i18n="welcome">Bienvenido a EduConnect</h2>
                    <p data-i18n="authSubtitle">Comparte conocimiento con tu comunidad académica</p>
                </div>
                
                <div class="auth-providers">
                    <button class="google-btn" onclick="signInWithGoogle()">
                        <i class="fab fa-google"></i>
                        <span data-i18n="continueWithGoogle">Continuar con Google</span>
                    </button>
                    
                    <div class="divider">
                        <span data-i18n="or">o</span>
                    </div>
                    
                    <form id="email-auth-form" onsubmit="handleEmailAuth(event)">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder=" " required>
                            <label for="email" data-i18n="email">Correo electrónico</label>
                        </div>
                        
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder=" " required>
                            <label for="password" data-i18n="password">Contraseña</label>
                        </div>
                        
                        <div class="auth-actions">
                            <button type="submit" name="action" value="login" class="btn-primary">
                                <i class="fas fa-sign-in-alt"></i>
                                <span data-i18n="login">Iniciar sesión</span>
                            </button>
                            <button type="submit" name="action" value="register" class="btn-secondary">
                                <i class="fas fa-user-plus"></i>
                                <span data-i18n="register">Registrarse</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Sección principal de la app -->
        <div id="app-section" class="app-section hidden">
            <div class="app-header">
                <div class="user-info">
                    <img id="user-avatar" src="https://www.gravatar.com/avatar/?d=mp&s=40" alt="Avatar" class="avatar">
                    <div class="user-details">
                        <span id="user-name" class="user-name"></span>
                        <span id="user-email" class="user-email"></span>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="logout">Cerrar sesión</span>
                </button>
            </div>

            <!-- Botón flotante para crear post (escritorio) -->
            <button class="fab" onclick="openCreatePostModal()" id="fab-desktop">
                <i class="fas fa-plus"></i>
                <span data-i18n="createPost">Crear publicación</span>
            </button>

            <!-- Feed de publicaciones -->
            <div class="posts-feed">
                <h3 class="feed-title">
                    <i class="fas fa-rss"></i>
                    <span data-i18n="feed">Feed de publicaciones</span>
                </h3>
                <div id="posts-list" class="posts-list"></div>
            </div>
        </div>
    </main>

    <!-- MODAL FLOTANTE PARA CREAR/EDITAR POST -->
    <div id="post-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" data-i18n="createPost">Crear publicación</h3>
                <button class="modal-close" onclick="closePostModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <!-- Avatar y nombre -->
                <div class="modal-author">
                    <img id="modal-author-avatar" src="https://www.gravatar.com/avatar/?d=mp&s=32" alt="Tu avatar">
                    <span id="modal-author-name"></span>
                </div>
                
                <!-- Área de texto -->
                <textarea 
                    id="modal-post-content" 
                    class="modal-post-input" 
                    placeholder='¿Qué quieres compartir hoy?'
                    rows="4"
                ></textarea>
                
                <!-- Vista previa de multimedia -->
                <div id="modal-media-preview" class="modal-media-preview hidden">
                    <button onclick="clearModalMedia()" class="close-preview">
                        <i class="fas fa-times"></i>
                    </button>
                    <div id="modal-preview-content"></div>
                </div>
                
                <!-- Barra de herramientas multimedia -->
                <div class="modal-toolbar">
                    <button onclick="triggerModalImageUpload()" class="toolbar-btn" title="Agregar imagen">
                        <i class="fas fa-image"></i>
                        <span data-i18n="image">Imagen</span>
                    </button>
                    <button onclick="triggerModalVideoUpload()" class="toolbar-btn" title="Agregar video">
                        <i class="fas fa-video"></i>
                        <span data-i18n="video">Video</span>
                    </button>
                    <button onclick="triggerModalAudioUpload()" class="toolbar-btn" title="Agregar audio">
                        <i class="fas fa-music"></i>
                        <span data-i18n="audio">Audio</span>
                    </button>
                </div>
                
                <!-- Inputs ocultos -->
                <input type="file" id="modal-image-upload" accept="image/*" class="hidden" onchange="handleModalImageUpload(event)">
                <input type="file" id="modal-video-upload" accept="video/*" class="hidden" onchange="handleModalVideoUpload(event)">
                <input type="file" id="modal-audio-upload" accept="audio/*" class="hidden" onchange="handleModalAudioUpload(event)">
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closePostModal()" data-i18n="cancel">Cancelar</button>
                <button class="btn-publish" onclick="savePost()" id="modal-save-btn">
                    <i class="fas fa-paper-plane"></i>
                    <span data-i18n="publish">Publicar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Template para posts -->
    <template id="post-template">
        <article class="post-card">
            <div class="post-header">
                <img class="post-author-avatar" src="" alt="Avatar">
                <div class="post-author-info">
                    <span class="post-author-name"></span>
                    <span class="post-date"></span>
                </div>
            </div>
            
            <div class="post-content">
                <p class="post-text"></p>
                <div class="post-media"></div>
            </div>
            
            <div class="post-footer">
                <button class="post-action like-btn">
                    <i class="far fa-heart"></i>
                    <span class="like-count">0</span>
                </button>
                <div class="post-owner-actions hidden">
                    <button class="post-action edit-btn" onclick="editPost(this)">
                        <i class="fas fa-edit"></i>
                        <span data-i18n="edit">Editar</span>
                    </button>
                    <button class="post-action delete-btn" onclick="deletePost(this)">
                        <i class="fas fa-trash"></i>
                        <span data-i18n="delete">Eliminar</span>
                    </button>
                </div>
            </div>
        </article>
    </template>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/posts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
